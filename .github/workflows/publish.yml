name: Publish to PyPI (conditional on commit message)

on:
  push:
    branches:
      - master

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.check.outputs.run_ci }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check commit message pattern
        id: check
        run: |
          msg="${{ github.event.head_commit.message }}"
          echo "Last commit message: $msg"

          if [[ "$msg" =~ ^([0-9]+)-([0-9]+)-([0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Commit matches pattern. Version will be: $VERSION"
          else
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Commit does NOT match N-N-N pattern, skipping publish."
          fi

  build-and-publish:
    needs: check-commit
    if: needs.check-commit.outputs.run_ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Normalise README filename to README.md
        run: |
          # Always ensure README.md exists (handles readme.md, Readme.md etc.)
          if [ ! -f "README.md" ]; then
            README_LOWER=$(find . -maxdepth 1 -iname "readme.md" | head -1)
            if [ -n "$README_LOWER" ]; then
              cp "$README_LOWER" README.md
              echo "Copied $README_LOWER → README.md"
            else
              echo "ERROR: No README file found!"
              ls -la
              exit 1
            fi
          fi
          echo "--- README.md first 5 lines ---"
          head -5 README.md

      - name: Update version in setup.py
        run: |
          VERSION="${{ needs.check-commit.outputs.version }}"
          echo "Setting version to: $VERSION"
          sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" setup.py
          grep "version=" setup.py

      - name: Clean old build artifacts
        run: rm -rf dist/ build/ *.egg-info/

      - name: Build package
        run: python -m build

      - name: Verify METADATA in built package
        run: |
          WHL=$(ls dist/*.whl)
          echo "Inspecting $WHL"
          python -c "
          import zipfile
          whl = '$WHL'
          with zipfile.ZipFile(whl) as z:
              meta = [f for f in z.namelist() if f.endswith('METADATA')][0]
              content = z.read(meta).decode()
              print(content[:800])
          "

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*
