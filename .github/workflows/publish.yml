name: Publish to PyPI (conditional on commit message)

on:
  push:
    branches:
      - master   # only when pushing to master

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.check.outputs.run_ci }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check commit message pattern
        id: check
        run: |
          msg="${{ github.event.head_commit.message }}"
          echo "Last commit message: $msg"

          if [[ "$msg" =~ ^([0-9]+)-([0-9]+)-([0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Commit matches pattern. Version will be: $VERSION"
          else
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Commit does NOT match N-N-N pattern, skipping publish."
          fi

  build-and-publish:
    needs: check-commit
    if: needs.check-commit.outputs.run_ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Detect README and fix setup.py
        run: |
          # find the readme file
          if [ -f "README.md" ]; then
            README_FILE="README.md"
          elif [ -f "readme.md" ]; then
            README_FILE="readme.md"
          else
            echo "ERROR: No README file found!"
            ls -la
            exit 1
          fi

          echo "Found: $README_FILE"
          echo "--- First 5 lines ---"
          head -5 "$README_FILE"

          # patch setup.py to use the correct filename
          sed -i "s|open(\"README.md\"|open(\"$README_FILE\"|g" setup.py
          sed -i "s|open(\"readme.md\"|open(\"$README_FILE\"|g" setup.py
          echo "--- setup.py open() line ---"
          grep "open(" setup.py

      - name: Update version in setup.py
        run: |
          VERSION="${{ needs.check-commit.outputs.version }}"
          echo "Setting version to: $VERSION"
          sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" setup.py
          grep "version=" setup.py

      - name: Clean old build artifacts
        run: rm -rf dist/ build/ *.egg-info/

      - name: Build package
        run: python -m build

      - name: Verify METADATA in built package
        run: |
          WHL=$(ls dist/*.whl)
          echo "Inspecting $WHL"
          python -c "
          import zipfile
          whl = '$WHL'
          with zipfile.ZipFile(whl) as z:
              meta = [f for f in z.namelist() if f.endswith('METADATA')][0]
              content = z.read(meta).decode()
              print(content[:600])
          "

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*